# Sample Hermes config mirroring the real ~/.hermes/config.yaml layout.
_config_version: 42
model:
  default: gpt-4o
  provider: openai
  openrouter:
    api_key: FAKE-do-not-use
agent:
  max_turns: 150
security:
  tirith_enabled: false        # skill scanner OFF -> hygiene posture finding
  allow_lazy_installs: true    # unattended installs -> finding
  redact_secrets: true
skills:
  external_dirs: []
  inline_shell: false
  guard_agent_created: false   # self-authored skills unguarded -> finding
memory:
  provider: honcho
  honcho:
    base_url: http://localhost:8000
approvals:
  mode: smart
  cron_mode: approve
command_allowlist:
slack:
  require_mention: true        # mention required -> not strangers
  allowed_channels: ''
telegram:
  allowed_chats: ''            # no allow-list -> accepts strangers
gateway:
  strict: false
  platforms:
  - telegram
  telegram:
    token: FAKE-do-not-use
honcho:
  enabled: true
