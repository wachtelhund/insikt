name: release

# Build the pure-Python wheel and attach it to a GitHub Release. The install
# script (and `insikt update`) download this wheel — a single ~75KB artifact —
# so users never clone the whole repo. Tag a release to publish:
#   git tag v0.0.2 && git push origin v0.0.2

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build wheel
        run: uv build --wheel
      - name: Smoke-test the wheel
        run: |
          uv venv --python 3.13 /tmp/v
          uv pip install --python /tmp/v/bin/python dist/*.whl
          /tmp/v/bin/insikt --version
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
